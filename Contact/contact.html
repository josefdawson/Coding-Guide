<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="contstyle.css">
    <title>Coding Guide: Contact & Share</title>
</head>
<body>
    <h1 id="title">You did it! Share with others!</h1>
    <div id="contact-container">
        <p class="share-text">Help others learn to code too! Share this guide with your friends.</p>
        <div id="share-buttons">
            <button id="copy-link">📋 Copy Link</button>
            <button id="share-email">📧 Share via Email</button>
            <button id="share-twitter">🐦 Share on Twitter/X</button>
        </div>
        <div id="feedback-form">
            <h2>Send us feedback</h2>
            <input type="text" id="feedback-name" placeholder="Your Name">
            <input type="email" id="feedback-email" placeholder="Your Email">
            <textarea id="feedback-message" placeholder="Your message or feedback..." rows="5"></textarea>
            <button id="send-feedback">Send Feedback</button>
            <p id="feedback-status"></p>
        </div>
        <button id="home-btn">← Back to Dashboard</button>
    </div>
    <script src="contact.js"></script>
</body>
</html>
