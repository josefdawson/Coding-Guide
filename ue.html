<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coding Guide: Log in & Sign Up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 class="page-title">Welcome to Coding Guide</h1>

  <div class="container">
    <div class="box">
      <h2>Sign Up</h2>
      <input type="text" id="reg-username" placeholder="Choose Username">
      <input type="password" id="reg-password" placeholder="Choose Password">
      <button id="signup-btn">Sign Up</button>
    </div>

    <div class="box">
      <h2>Log In</h2>
      <input type="text" id="login-username" placeholder="Username">
      <input type="password" id="login-password" placeholder="Password">
      <button id="login-btn">Log In</button>
    </div>
  </div>

  <div id="custom-alert" class="popup-alert">
    <p id="alert-text">Message goes here</p>
  </div>

  <button id="admin-btn">🔧</button>
  <script src="sign.js"></script>
</body>
</html>
