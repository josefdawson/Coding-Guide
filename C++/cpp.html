        data-code='#include &lt;iostream&gt;&#10;int main() {&#10;    int score = 85;&#10;    if (score &gt;= 90) {&#10;        std::cout &lt;&lt; "A" &lt;&lt; std::endl;&#10;    } else if (score &gt;= 80) {&#10;        std::cout &lt;&lt; "B" &lt;&lt; std::endl;&#10;    } else {&#10;        std::cout &lt;&lt; "C" &lt;&lt; std::endl;&#10;    }&#10;&#10;    char grade = &#39;B&#39;;&#10;    switch (grade) {&#10;        case &#39;A&#39;: std::cout &lt;&lt; "Excellent"; break;&#10;        case &#39;B&#39;: std::cout &lt;&lt; "Good"; break;&#10;        default: std::cout &lt;&lt; "Try harder";&#10;    }&#10;    return 0;&#10;}'
        data-real-text="Conditionals use if/else if/else and switch for multiple discrete cases, with break to exit each case:">

    <p id="p6" class="lesson-card"
        data-code='#include &lt;iostream&gt;&#10;int main() {&#10;    // For loop&#10;    for (int i = 0; i &lt; 5; i++) {&#10;        std::cout &lt;&lt; i &lt;&lt; " ";&#10;    }&#10;    std::cout &lt;&lt; std::endl;&#10;&#10;    // While loop&#10;    int count = 0;&#10;    while (count &lt; 3) {&#10;        std::cout &lt;&lt; count &lt;&lt; " ";&#10;        count++;&#10;    }&#10;    std::cout &lt;&lt; std::endl;&#10;&#10;    // Do-while loop&#10;    int n = 0;&#10;    do {&#10;        std::cout &lt;&lt; n &lt;&lt; " ";&#10;        n++;&#10;    } while (n &lt; 3);&#10;    return 0;&#10;}'

        ???</p>
    <p id="p7" class="lesson-card"
        data-code='#include &lt;iostream&gt;&#10;#include &lt;vector&gt;&#10;int main() {&#10;    int arr[5] = {1, 2, 3, 4, 5};&#10;    std::cout &lt;&lt; arr[0] &lt;&lt; std::endl;  // 1&#10;&#10;    std::vector&lt;int&gt; nums = {10, 20, 30};&#10;    nums.push_back(40);&#10;    std::cout &lt;&lt; nums.size() &lt;&lt; std::endl;  // 4&#10;    std::cout &lt;&lt; nums[1] &lt;&lt; std::endl;      // 20&#10;    return 0;&#10;}'

        ???</p>
    <p id="p8" class="lesson-card"
        data-code='#include &lt;iostream&gt;&#10;int main() {&#10;    int x = 42;&#10;    int* ptr = &amp;x;  // Pointer stores address&#10;    int&amp; ref = x;    // Reference is an alias&#10;&#10;    std::cout &lt;&lt; *ptr &lt;&lt; std::endl;  // 42 (dereference)&#10;    std::cout &lt;&lt; ref &lt;&lt; std::endl;   // 42&#10;&#10;    ref = 100;&#10;    std::cout &lt;&lt; x &lt;&lt; std::endl;     // 100&#10;    return 0;&#10;}'
        data-real-text="Pointers store memory addresses (use * to declare and dereference), references are aliases to existing variables:">

        data-code='#include &lt;iostream&gt;&#10;#include &lt;string&gt;&#10;class Dog {&#10;public:&#10;    std::string name;&#10;    int age;&#10;&#10;    Dog(std::string n, int a) : name(n), age(a) {}&#10;&#10;    void bark() {&#10;        std::cout &lt;&lt; name &lt;&lt; " says Woof!" &lt;&lt; std::endl;&#10;    }&#10;};&#10;int main() {&#10;    Dog dog("Rex", 3);&#10;    dog.bark();  // Rex says Woof!&#10;    return 0;&#10;}'

    <p id="p10" class="lesson-card"
        data-code='#include &lt;iostream&gt;&#10;#include &lt;fstream&gt;&#10;#include &lt;string&gt;&#10;int main() {&#10;    std::ofstream fout("test.txt");&#10;    fout &lt;&lt; "Hello C++!" &lt;&lt; std::endl;&#10;    fout.close();&#10;&#10;    std::ifstream fin("test.txt");&#10;    std::string line;&#10;    while (std::getline(fin, line)) {&#10;        std::cout &lt;&lt; line &lt;&lt; std::endl;&#10;    }&#10;    fin.close();&#10;    return 0;&#10;}'
